# V0 - VizDoom Basic, PPO (Tier A): pipeline sanity check.
# Aspect: validates the 3D Dict-obs wrapper + frame stack end-to-end. Basic is
# trivial (aim and shoot one monster) and should solve in minutes.
# NOTE: confirm the registered env id on first run -- the Farama wrapper has
# historically used the -v0 suffix (VizdoomBasic-v0). Edit env_id if it differs.
exp_id: V0_basic
task: vizdoom
algo: ppo
env_id: VizdoomBasic-v1
policy: CnnPolicy
n_envs: 16
n_stack: 4
frame_skip: 4
obs_shape: [84, 84]
grayscale: true
seed: 0
total_timesteps: 400000       # bumped: first run collapsed to -300 mid-training
eval_freq: 25000
eval_episodes: 20
checkpoint_freq: 100000
device: cuda
record_gif: true
algo_kwargs:
  learning_rate: 1.0e-4       # lowered from 2.5e-4 for stability
  n_steps: 128
  batch_size: 512
  n_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.03              # raised from 0.01 to keep exploring (anti-collapse)
  vf_coef: 0.5
